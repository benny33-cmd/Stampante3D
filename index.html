<!DOCTYPE html>
<html>
<head>
    <title>Stampante 3D</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
        }

        header {
            background: #1f3b5c;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .section {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<header>
    <h1>Stampante 3D Scuola</h1>
</header>

<div class="section">
    <h2>🎬 Tutorial</h2>
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/GbsUidEGIws">
    </iframe>
</div>

<div class="section">
    <h2>📦 Progetti</h2>

    <div class="card">🌍 Terra</div>
    <div class="card">🌋 Vulcano</div>
    <div class="card">🧠 Sistema Limbico</div>
    <div class="card">📈 Funzioni</div>
    <div class="card">🏛 Tempio</div>
</div>

<div class="section">
    <h2>📅 Prenotazione</h2>

    <form>
        Nome: <input type="text"><br><br>

        Progetto:
        <select>
            <option>Terra</option>
            <option>Vulcano</option>
        </select><br><br>

        Orario:
        <select>
            <option>7:55-8:50</option>
            <option>8:50-9:45</option>
        </select><br><br>

        <button>Prenota</button>
    </form>
</div>

</body>
</html>
